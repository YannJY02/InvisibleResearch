# InvisibleResearch Workflow Migrate Or Refactor Major Workspace Component

## Action

Follow the migrate-or-refactor-major-workspace-component workflow:
1. Update or add multiple README.md files across root, data, docs, research, and submodules.
2. Modify or add scripts in scripts/ or src/invisible_research/ subdirectories.
3. Update or add Jupyter notebooks in notebooks/ or research/*/notebooks/.
4. Update or add documentation in docs/ and research/*/README.md.
5. Update or add test files in tests/.
6. Update run_pipeline.sh if pipeline steps are affected.
7. Update or add artifact/component manifest files in data/artifact-versions/ or data/component-manifests/.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: README.md, data/README.md, docs/*.md

